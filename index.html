<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>考公学习计划看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #17212b;
      --muted: #637083;
      --line: #d9e1ec;
      --blue: #2b5b9e;
      --green: #2f6f5e;
      --amber: #b7791f;
      --rose: #8b1e3f;
      --cyan: #176b87;
      --soft-blue: #e8f0fb;
      --soft-green: #e8f3ef;
      --soft-amber: #fbf0d8;
      --soft-rose: #f8e7ed;
      --shadow: 0 12px 30px rgba(23, 33, 43, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 760;
    }

    .subline {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn, .select, .input {
      height: 36px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 12px;
    }

    .btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn.primary {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }

    .btn:focus-visible, .select:focus-visible, .input:focus-visible {
      outline: 3px solid rgba(43, 91, 158, 0.24);
      outline-offset: 2px;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 16px 16px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 720;
    }

    .panel-body {
      padding: 16px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric .value {
      font-size: 26px;
      font-weight: 780;
      line-height: 1.1;
    }

    .today-layout {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .date-tile {
      border-radius: 8px;
      background: #152534;
      color: #ffffff;
      padding: 18px;
      display: grid;
      align-content: center;
      min-height: 220px;
    }

    .date-month {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.74);
    }

    .date-day {
      font-size: 56px;
      line-height: 1;
      font-weight: 820;
      margin: 8px 0;
    }

    .date-week {
      font-size: 18px;
      font-weight: 650;
    }

    .task-stack {
      display: grid;
      gap: 10px;
    }

    .task-line {
      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);
      border-radius: 8px;
      padding: 12px 14px;
      background: #ffffff;
    }

    .task-line:nth-child(2) { border-left-color: var(--green); }
    .task-line:nth-child(3) { border-left-color: var(--amber); }
    .task-line:nth-child(4) { border-left-color: var(--rose); }

    .task-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .task-check {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--green);
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
    }

    .task-check input {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
    }

    .task-check.done input {
      accent-color: var(--green);
    }

    .task-check.unfinished {
      color: var(--rose);
    }

    .task-check.unfinished input {
      accent-color: var(--rose);
    }

    .task-check:has(input:checked) {
      font-weight: 760;
    }

    .task-line.unfinished {
      border-left-color: var(--rose);
      background: #fffafb;
    }

    .task-actions {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: var(--blue);
      padding: 0;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
    }

    .link-btn.danger {
      color: var(--rose);
    }

    .task-line.extra {
      border-left-color: var(--cyan);
      background: #fbfdff;
    }

    .extra-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .textarea {
      min-height: 74px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.45;
      color: var(--ink);
      background: #ffffff;
    }

    .textarea:focus-visible {
      outline: 3px solid rgba(43, 91, 158, 0.24);
      outline-offset: 2px;
    }

    .task-text {
      font-size: 14px;
      line-height: 1.55;
    }

    .stage-list {
      display: grid;
      gap: 12px;
    }

    .stage-row {
      display: grid;
      grid-template-columns: 96px 1fr 54px;
      gap: 12px;
      align-items: center;
    }

    .stage-name {
      font-weight: 680;
      font-size: 13px;
    }

    .progress-track {
      height: 12px;
      border-radius: 999px;
      background: #edf1f6;
      overflow: hidden;
      border: 1px solid #e2e9f2;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
      width: 0%;
    }

    .stage-row:nth-child(2) .progress-fill { background: var(--green); }
    .stage-row:nth-child(3) .progress-fill { background: var(--amber); }
    .stage-row:nth-child(4) .progress-fill { background: var(--rose); }
    .stage-row:nth-child(5) .progress-fill { background: var(--cyan); }

    .progress-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-size: 12px;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 999px;
      height: 32px;
      padding: 0 12px;
      cursor: pointer;
      color: var(--muted);
    }

    .chip.active {
      color: #ffffff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding-bottom: 2px;
    }

    .day {
      min-height: 98px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 9px;
      display: grid;
      align-content: start;
      gap: 7px;
      cursor: pointer;
      text-align: left;
    }

    .day.blank {
      background: transparent;
      border-color: transparent;
      cursor: default;
    }

    .day.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(43, 91, 158, 0.16);
    }

    .day.today {
      background: #fbfcfe;
    }

    .day.rest {
      background: #f1f4f8;
      color: var(--muted);
    }

    .day.done {
      border-color: rgba(47, 111, 94, 0.5);
      background: var(--soft-green);
    }

    .day.partial {
      border-color: rgba(183, 121, 31, 0.65);
      background: var(--soft-amber);
    }

    .day.no-progress {
      border-color: rgba(139, 30, 63, 0.48);
      background: var(--soft-rose);
    }

    .day-number {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 720;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--line);
    }

    .dot-资料分析 { background: var(--blue); }
    .dot-判断推理 { background: var(--green); }
    .dot-言语理解 { background: var(--amber); }
    .dot-数量关系 { background: var(--rose); }
    .dot-单休 { background: #a5afbd; }

    .day.done .status-dot { background: var(--green); }
    .day.partial .status-dot { background: var(--amber); }
    .day.no-progress .status-dot { background: var(--rose); }

    .day-subject {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .detail-grid {
      display: grid;
      gap: 10px;
    }

    .detail-top {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 12px;
      background: var(--soft-blue);
      color: var(--blue);
      font-weight: 680;
    }

    .check-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }

    .upcoming {
      display: grid;
      gap: 8px;
    }

    .upcoming-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #ffffff;
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      align-items: center;
    }

    .upcoming-date {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .upcoming-main {
      min-width: 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .suite-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .suite {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 14px;
      min-height: 158px;
    }

    .suite h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .suite p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .topbar-inner,
      .dashboard {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .metric-grid,
      .suite-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .today-layout {
        grid-template-columns: 1fr;
      }

      .date-tile {
        min-height: 140px;
      }
    }

    @media (max-width: 640px) {
      main {
        padding: 14px;
      }

      .topbar-inner {
        padding: 16px 14px;
      }

      h1 {
        font-size: 21px;
      }

      .metric-grid,
      .suite-grid {
        grid-template-columns: 1fr;
      }

      .calendar {
        gap: 5px;
      }

      .day {
        min-height: 78px;
        padding: 7px;
      }

      .day-subject {
        font-size: 11px;
      }

      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>考公学习计划看板</h1>
          <div class="subline">2026-06-03 至 2026-09-30 · 103 个学习日 · 周日单休</div>
        </div>
        <div class="toolbar">
          <select id="monthSelect" class="select" aria-label="月份"></select>
          <button id="prevDayButton" class="btn">前一日</button>
          <button id="todayButton" class="btn">今日</button>
          <button id="nextDayButton" class="btn">后一日</button>
          <button id="resetButton" class="btn">清空打卡</button>
        </div>
      </div>
    </header>

    <main>
      <section class="metric-grid" aria-label="总览">
        <div class="metric">
          <span class="label">计划学习日</span>
          <span class="value" id="metricStudyDays">103</span>
        </div>
        <div class="metric">
          <span class="label">已到进度</span>
          <span class="value" id="metricScheduled">0%</span>
        </div>
        <div class="metric">
          <span class="label">打卡完成</span>
          <span class="value" id="metricCompleted">0</span>
        </div>
        <div class="metric">
          <span class="label">当前模块</span>
          <span class="value" id="metricModule">资料</span>
        </div>
      </section>

      <section class="dashboard">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">今日任务</h2>
            <span class="badge" id="todayBadge">资料分析</span>
          </div>
          <div class="panel-body">
            <div class="today-layout">
              <div class="date-tile">
                <div class="date-month" id="dateMonth">2026-06</div>
                <div class="date-day" id="dateDay">03</div>
                <div class="date-week" id="dateWeek">周三</div>
              </div>
              <div class="task-stack" id="todayTasks"></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">阶段进度</h2>
          </div>
          <div class="panel-body">
            <div class="stage-list" id="stageList"></div>
          </div>
        </div>
      </section>

      <section class="dashboard">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">日历</h2>
            <div class="filters" id="filters"></div>
          </div>
          <div class="panel-body">
            <div class="calendar" id="calendar"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">选中日期</h2>
            <span class="badge" id="selectedBadge">资料分析</span>
          </div>
          <div class="panel-body">
            <div class="detail-grid" id="detail"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">后续 7 个学习日</h2>
        </div>
        <div class="panel-body">
          <div class="upcoming" id="upcoming"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">10-11 月套卷阶段</h2>
        </div>
        <div class="panel-body">
          <div class="suite-grid" id="suiteGrid"></div>
        </div>
      </section>
    </main>

        renderAll();
      }

      if (event.target.classList.contains("extraStatusRadio")) {
        setExtraTaskStatus(state.selectedDate, event.target.dataset.extraId, event.target.value);
        renderAll();
      }
    });

    document.getElementById("todayButton").addEventListener("click", () => {
      state.selectedDate = getCurrentPlanDate();
      state.month = state.selectedDate.slice(0, 7);
      renderAll();
    });

    document.getElementById("prevDayButton").addEventListener("click", () => {
      shiftSelectedDate(-1);
    });

    document.getElementById("nextDayButton").addEventListener("click", () => {
      shiftSelectedDate(1);
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      state.completed = {};
      saveCompleted();
      renderAll();
    });

    renderAll();
  </script>
</body>
</html>
